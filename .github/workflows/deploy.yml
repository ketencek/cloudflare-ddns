name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.RASPBERRY_SSH_KEY }}" > ~/.ssh/raspberry_key
          chmod 600 ~/.ssh/raspberry_key
          ssh-keyscan -p "${{ secrets.RASPBERRY_PORT }}" "${{ secrets.RASPBERRY_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh \
            -i ~/.ssh/raspberry_key \
            -p "${{ secrets.RASPBERRY_PORT }}" \
            "${{ secrets.RASPBERRY_USER }}@${{ secrets.RASPBERRY_HOST }}" \
            'set -euo pipefail
             cd /home/salih/projects/cloudflare-ddns
             git pull origin main
             if [ ! -d venv ]; then
               python3 -m venv venv
             fi
             ./venv/bin/python -m pip install --upgrade pip
             ./venv/bin/pip install -r requirements.txt
             sudo cp systemd/cloudflare-ddns.service /etc/systemd/system/cloudflare-ddns.service
             sudo cp systemd/cloudflare-ddns.timer /etc/systemd/system/cloudflare-ddns.timer
             sudo systemctl daemon-reload
             sudo systemctl enable cloudflare-ddns.timer
             sudo systemctl restart cloudflare-ddns.timer'

      - name: Send deployment email notification
        if: always()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          DEPLOY_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_TITLE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os
          import smtplib
          import ssl
          from email.message import EmailMessage

          required = [
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USER",
              "SMTP_PASSWORD",
              "MAIL_FROM",
              "MAIL_TO",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print(f"Email notification skipped. Missing secrets: {', '.join(missing)}")
              raise SystemExit(0)

          status = os.environ["DEPLOY_STATUS"].upper()
          repository = os.environ["REPOSITORY"]
          subject = f"[{status}] {repository} deploy"

          commit_title = os.environ.get("COMMIT_TITLE", "").strip().replace("\n", " ")
          body = f"""Deployment status: {status}
          Repository: {repository}
          Branch: {os.environ["BRANCH_NAME"]}
          Commit: {os.environ["COMMIT_SHA"]}
          Message: {commit_title}
          Run: {os.environ["RUN_URL"]}
          """

          message = EmailMessage()
          message["Subject"] = subject
          message["From"] = os.environ["MAIL_FROM"]
          message["To"] = os.environ["MAIL_TO"]
          message.set_content(body)

          port = int(os.environ["SMTP_PORT"])
          context = ssl.create_default_context()

          if port == 465:
              with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], port, context=context) as server:
                  server.login(os.environ["SMTP_USER"], os.environ["SMTP_PASSWORD"])
                  server.send_message(message)
          else:
              with smtplib.SMTP(os.environ["SMTP_HOST"], port) as server:
                  server.starttls(context=context)
                  server.login(os.environ["SMTP_USER"], os.environ["SMTP_PASSWORD"])
                  server.send_message(message)

          print("Email notification sent.")
          PY
